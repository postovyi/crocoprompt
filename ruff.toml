# Exclude a variety of commonly ignored directories.
exclude = [
   ".bzr",
   ".direnv",
   ".eggs",
   ".git",
   ".git-rewrite",
   ".hg",
   ".ipynb_checkpoints",
   ".mypy_cache",
   ".nox",
   ".pants.d",
   ".pyenv",
   ".pytest_cache",
   ".pytype",
   ".ruff_cache",
   ".svn",
   ".tox",
   ".venv",
   ".vscode",
   "__pypackages__",
   "_build",
   "buck-out",
   "build",
   "dist",
   "node_modules",
   "site-packages",
   "venv",
   "*.ipynb", # ignore notebooks
   "tests"
]


# Same as Black.
line-length = 120
indent-width = 4


# Assume Python 3.11
target-version = "py311"


# Source directories for import resolution
src = ["crocoprompt"]


[lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`) codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
ignore = [
   # It is not C, we allow Yoda expression as they are sometimes useful
   # (if 0.0 < x and x < 10.0)
   "ANN003", # missing-type-annotation for `**kwargs`
   "ANN204", # missing-return-type-doc for __init__ methods
   "ANN401",
   "B008",
   "DTZ005", # pass-timezone-object
   "E501",   # line-too-long
   "G004",   # logging-fstring-interpolation (W1203),
   "SIM300",
   "B006", # Learn Python yo!
   "C408", # Unnecessary dict/list call
   "COM812", # Missing trailing comma - conflicts with formatter
   "COM819", # Trailing commas is da bomb
   "E731", # Do not assign to lambda
   "ERA001",
   "G004", # Logging format string should not use f-string
   "PERF401",
   "PLC0415",
   "RET503", # No explicit return None (all the other rules are about removing unnecessary things like this)
   "RUF012", # Mutable class attributes should be annotated with typing.ClassVar
   "S311", # Standard pseudo-random generators are not suitable for security/cryptographic purposes
   "SIM108", # don"t like ternary operator
   "SIM300", # Yoda is wiser than you!
   "T201", # comment code, prints are lax during development
   "TRY003",  # Avoid long messages outside of exception class
   "TRY301",  # Abstract raise garbage
   "UP015",
   "W291", # Trailing whitespace. We use this a lot in the prompts
   "W293" # Blank line with whitespace. We use this a lot in the prompts
 ]
select = [
   "ANN", # flake8-annotations
   "B", # flake8-bugbear
   "C4",  # unnecessary comprehensions, map()
   "COM",  # flake8-commas
   "DTZ", # flake8-datetimez
   "E",
   "ERA",  # No commented out code
   "EXE", # flake8-executable
   "F",  # pyflakes
   "FLY",  # flynt
   "G",  # flake8-logging-format
   "I",  # isort
   "ICN", # https://github.com/joaopalmeiro/flake8-import-conventions
   "LOG", # flake8-logging
   "PERF", # perflint
   "PLC",  # Pylint conventions
   "PLE",  # Pylint error
   "PLW",  # Pylint warnings
   "RUF",
   "S", # flake8-bandit
   "SIM", # flake8-simplify
   "T",  # flake8-debugger
   "UP",  # pyupgrade
   "W",  # pycodestyle
 ]


# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []


# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"


[format]
# Like Black, use double quotes for strings.
quote-style = "double"


# Like Black, indent with spaces, rather than tabs.
indent-style = "space"


# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false


# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"


# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false


# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

